# RF-DETR Seg DINOv3 ConvNext Tiny — example segmentation training configuration.
# Usage:
#   rfdetr fit --config configs/rfdetr_seg_dinov3_convnext_tiny.yaml

model:
  model_config:
    class_path: rfdetr.config.RFDETRSegDinoV3ConvNextTinyConfig
    init_args:
      num_classes: 80 # set to your dataset class count
  train_config:
    class_path: rfdetr.config.SegmentationTrainConfig
    init_args:
      dataset_dir: /data/coco # required: path to your COCO-format dataset
      output_dir: output/rfdetr_seg_dinov3_convnext_tiny
      epochs: 100
      batch_size: 4
      num_workers: 4
      tensorboard: true
